<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tempmail</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <div id="root">
      <script>
        $(function() {
          $(".resurrect-btn").on("click", function() {
            const email = $(this).data("email");
            $.ajax({
              type: "POST",
              url: "/api/resurrectemail",
              data: { email },
              success: function() {
                alert("Email resurrected successfully!");
                loadEmails();
              },
              error: function() {
                alert("Error resurrecting email.");
              }
            });
          });
          $('#emailform').on('submit', function(e) {
            e.preventDefault();
            $.ajax({
              type: 'POST',
              url: '/api/maketempmail',
              data: $(this).serialize(),
              success: function(response) {
                alert('Temporary email created successfully!');
              },
              error: function() {
                alert('Error creating temporary email.');
              }
            });
          });
          function loadEmails() {
            $.ajax({
              type: 'GET',
              url: '/api/listemails',
              success: function(emails) {
                $('#emaillist').empty();
                emails.forEach(function(email) {
                  if(email.type === 'dump') {
                    $('#emaillist').append(
                      `<div class='listitem'>
                        <div>
                          <strong>${email.email}</strong> 
                          forwards to <em>${email.destination}</em>
                        </div>
                        <div>
                          <button class="resurrect-btn" 
                            data-email="${email.temp_email}">
                            Resurrect
                          </button>
                        </div>
                      <div>`
                    );
                    return;
                  }else if(email.type === 'virtual') {
                    $('#emaillist').append(
                      `<div class='listitem'>
                        <div>
                          <strong>${email.email}</strong> 
                          forwards to <em>${email.destination}</em>
                        </div>
                      <div>`
                    );
                    }
                });
              },
              error: function() {
                alert('Error loading emails.');
              }
            });
          }
          loadEmails();
        });
      </script>
      <p>By default these emails are active for 24 hours, then they will
expire and stop forwarding. You may resurrect an email by clicking the
 "Resurrect" button next to it in the list below.
      </p>
        <form id="emailform">
            <label for="tempEmail">Temporary Email: </label>
            <input  type="text" 
                    name="tempEmail"
                    id="tempEmail" 
                    placeholder="Enter email to create" 
                    required 
                    value="@posis.me"
            /><br />
            <label for="forwardEmail">Forward To: </label>
            <input  type="text" 
                    name="forwardEmail" 
                    id="forwardEmail"
                    placeholder="Enter email to forward to" 
                    required
                    value="@gmail.com"
            /><br />
            <button type="submit">Make Temporary Email</button>
        </form>
        <div id="emaillist">

        </div>
    </div>
  </body>
</html>
