<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tempmail</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>
  <body>
    <div id="root">
      <script>
        $(function() {
          $('#emailform').on('submit', function(e) {
            e.preventDefault();
            $.ajax({
              type: 'POST',
              url: '/api/maketempmail',
              data: $(this).serialize(),
              success: function(response) {
                alert('Temporary email created successfully!');
              },
              error: function() {
                alert('Error creating temporary email.');
              }
            });
          });
          function loadEmails() {
            $.ajax({
              type: 'GET',
              url: '/api/listemails',
              success: function(emails) {
                $('#emaillist').empty();
                emails.forEach(function(email) {
                  $('#emaillist').append(
                    `<div>
                      <strong>${email.temp_email}</strong> forwards to <em>${email.forward_email}</em> and expires at ${email.expires_at}
                    </div>`
                  );
                });
              },
              error: function() {
                alert('Error loading emails.');
              }
            });
          }
          loadEmails();
        });
      </script>
        <form id="emailform">
            <input  type="text" 
                    name="tempEmail" 
                    placeholder="Enter email to create" 
                    required 
                    value="@posis.me"
            />
            <input  type="text" 
                    name="forwardEmail" 
                    placeholder="Enter email to forward to" 
                    required
            />
            <input  type="text" 
                    name="duration" 
                    placeholder="Enter duration in hours" 
                    required
                    value="24"
            />
            <button type="submit">Make Temporary Email</button>
        </form>
        <div id="emaillist">

        </div>
    </div>
  </body>
</html>
