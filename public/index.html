<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tempmail</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>
  <body>
    <div id="root">
      <script>
        $(function() {
          $('form').on('submit', function(e) {
            e.preventDefault();
            $.ajax({
              type: 'POST',
              url: '/api/maketempmail',
              data: $(this).serialize(),
              success: function(response) {
                alert('Temporary email created successfully!');
              },
              error: function() {
                alert('Error creating temporary email.');
              }
            });
          });
        });
      </script>
        <form>
            <input  type="text" 
                    name="tempEmail" 
                    placeholder="Enter email to create" 
                    required 
                    value="@posis.me"
            />
            <input  type="text" 
                    name="forwardEmail" 
                    placeholder="Enter email to forward to" 
                    required
            />
            <input  type="text" 
                    name="duration" 
                    placeholder="Enter duration in hours" 
                    required
                    value="24"
            />
            <button type="submit">Make Temporary Email</button>
        </form>

    </div>
  </body>
</html>
